<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .get-started {
            background-color: rgb(121, 82, 179);
            color: white;
            border: none;
            border-radius: 2px;
            height: 40px;
            width: 120px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 8px;
        }

        .download {
            background-color: white;
            border: solid;
            border-width: 1px;
            height: 40px;
            width: 120px;
            border-radius: 2px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: rgb(108, 117, 125);
        }
    </style>
</head>
<body>
    <button class="get-started">Get started</button>
    <button class="download">Download</button>
</body>
</html>
